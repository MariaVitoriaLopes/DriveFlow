<section class="agendar-page">
  <div class="agendar-card">
    <div class="calendar-area">
      <div class="top-link">
        <button type="button" class="back-btn" (click)="voltar()">‹</button>
        <span>Home</span>
      </div>

      <h1>Agendar</h1>
      <p class="year">{{ anoAtual }}</p>

      <div class="calendar-header">
        <button type="button" (click)="mudarMes(-1)">‹</button>
        <strong>{{ mesAtual }}</strong>
        <button type="button" (click)="mudarMes(1)">›</button>
      </div>

      <div class="week-days">
        <span>D</span>
        <span>S</span>
        <span>T</span>
        <span>Q</span>
        <span>Q</span>
        <span>S</span>
        <span>S</span>
      </div>

      <div class="calendar-days">
        <button
          type="button"
          *ngFor="let item of diasCalendario"
          class="day"
          [class.other-month]="item.foraDoMes"
          [class.selected]="diaSelecionado(item)"
          (click)="selecionarDia(item)"
        >
          {{ item.dia }}
        </button>
      </div>
    </div>

    <div class="form-area">
      <h3>Informações</h3>

      <div class="info-grid">
        <label>
          Duração das aulas
          <input type="text" [value]="duracaoAula + ' minutos'" readonly />
        </label>

        <label>
          Tolerância a atrasos
          <input type="text" [value]="toleranciaEspera + ' minutos'" readonly />
        </label>
      </div>

      <label class="full">
        Local de Encontro
        <input type="text" [value]="localEncontro" readonly />
      </label>

      <h3>Horário</h3>

      <div class="info-grid">
        <label>
          Início
          <select
            [(ngModel)]="horarioInicio"
            (ngModelChange)="aoAlterarHorario()"
          >
            <option value="">Selecione</option>
            <option
              *ngFor="let horario of horariosDisponiveis"
              [value]="horario.inicio"
            >
              {{ horario.inicio }}
            </option>
          </select>
        </label>

        <label>
          Quantidade de aulas
          <select
            [(ngModel)]="quantidadeAulas"
            (ngModelChange)="aoAlterarQuantidade()"
          >
            <option [ngValue]="1">1 aula</option>
            <option [ngValue]="2" [disabled]="!podeSelecionarDuasAulas()">
              2 aulas
            </option>
          </select>
        </label>
      </div>

      <label class="full">
        Fim
        <input type="text" [value]="horarioFim || '--:--'" readonly />
      </label>

      <h3>Veículo</h3>

      <div class="check-list">
        <label>
          <input type="checkbox" checked disabled />
          <span>
            Veículo do Instrutor
            <small>({{ veiculoTexto }})</small>
          </span>
        </label>

        <label class="disabled">
          <input type="checkbox" disabled />
          <span>
            Seu veículo
            <small>(Não disponível)</small>
          </span>
        </label>
      </div>

      <div class="message" *ngIf="mensagem">
        {{ mensagem }}
      </div>

      <div class="valor-box">
        <h3>Valor</h3>

        <div>
          <span>Valor da aula/hora</span>
          <strong>{{ formatarMoeda(valorAula) }}</strong>
        </div>

        <div *ngIf="quantidadeAulas === 2">
          <span>Quantidade</span>
          <strong>2 aulas</strong>
        </div>

        <div>
          <span>Taxa</span>
          <strong>{{ formatarMoeda(taxa) }}</strong>
        </div>

        <div class="total">
          <span>Total</span>
          <strong>{{ formatarMoeda(total) }}</strong>
        </div>
      </div>

      <div class="actions">
        <button type="button" class="cancel" (click)="cancelar()">
          Cancelar
        </button>

        <button
          type="button"
          class="submit"
          [disabled]="carregando"
          (click)="agendarAula()"
        >
          Agendar aula
        </button>
      </div>
    </div>
  </div>
</section>
