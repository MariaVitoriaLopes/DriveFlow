<section class="agendar-page">
  <div class="agendar-card">
    <!-- CALENDÁRIO -->
    <div class="calendar-area">
      <div class="top-link">
        <button type="button" class="back-btn" (click)="router.navigate(['/aluno'])">‹</button>
        <span>Home</span>
      </div>

      <h1>Agendar</h1>
      <p class="year">{{ anoAtual }}</p>

      <div class="calendar-header">
        <button type="button" (click)="mudarMes(-1)">‹</button>
        <strong>{{ mesAtual }}</strong>
        <button type="button" (click)="mudarMes(1)">›</button>
      </div>

      <div class="week-days">
        <span>D</span>
        <span>S</span>
        <span>T</span>
        <span>Q</span>
        <span>Q</span>
        <span>S</span>
        <span>S</span>
      </div>

      <div class="calendar-days">
        <button
          *ngFor="let dia of diasCalendario"
          [class.selected]="dataSelecionada && dia.data?.getTime() === dataSelecionada.getTime()"
          [disabled]="dia.foraDoMes"
          (click)="selecionarDia(dia)"
        >
          {{ dia.dia || '-' }}
        </button>
      </div>
    </div>

    <!-- FORMULÁRIO DE AGENDAMENTO -->
    <div class="form-area">
      <h3>Informações</h3>
      <div class="info-grid">
        <label>
          Duração das aulas
          <input type="text" [value]="duracaoAula + ' minutos'" readonly />
        </label>
        <label>
          Tolerância a atrasos
          <input type="text" [value]="toleranciaEspera + ' minutos'" readonly />
        </label>
      </div>

      <label class="full">
        Local de Encontro
        <input type="text" [value]="localEncontro" readonly />
      </label>

      <h3>Horário</h3>
      <div class="info-grid">
        <label>
          Início
          <select [(ngModel)]="horarioInicio" (ngModelChange)="aoAlterarHorario()">
            <option value="">Selecione</option>
            <option *ngFor="let h of horariosDisponiveis" [value]="h.inicio">
              {{ h.inicio }}
            </option>
          </select>
        </label>

        <label>
          Quantidade de aulas
          <select [(ngModel)]="quantidadeAulas" (ngModelChange)="aoAlterarHorario()">
            <option [value]="1">1 aula</option>
            <option [value]="2" [disabled]="!horariosDisponiveis.find(h => h.inicio === horarioInicio)?.podeDuasAula">
              2 aulas
            </option>
          </select>
        </label>
      </div>

      <label class="full">
        Fim
        <input type="text" [value]="horarioFim || '--:--'" readonly />
      </label>

      <h3>Veículo</h3>
      <div class="check-list">
        <label>
          <input type="checkbox" checked disabled />
          <span>Veículo do Instrutor <small>({{ veiculoTexto }})</small></span>
        </label>
      </div>

      <div class="message" *ngIf="mensagem">{{ mensagem }}</div>

      <div class="valor-box">
        <h3>Valor</h3>
        <div><span>Valor da aula/hora</span> <strong>{{ valorAula | currency:'BRL' }}</strong></div>
        <div><span>Taxa</span> <strong>{{ taxa | currency:'BRL' }}</strong></div>
        <div class="total"><span>Total</span> <strong>{{ (valorAula*quantidadeAulas + taxa) | currency:'BRL' }}</strong></div>
      </div>

      <div class="actions">
        <button class="cancel" type="button" (click)="router.navigate(['/aluno'])">Cancelar</button>
        <button class="submit" type="button" (click)="agendarAula()">Agendar aula</button>
      </div>
    </div>
  </div>
</section>
