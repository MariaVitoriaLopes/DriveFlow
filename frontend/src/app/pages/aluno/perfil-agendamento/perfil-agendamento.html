<div class="agendamento-container">
  <div class="calendario">
    <h2>Agendar</h2>
    <input type="date" [(ngModel)]="dataSelecionada" (change)="buscarHorarios()" />
    <div *ngIf="mensagemErro" class="erro">{{ mensagemErro }}</div>

    <select [(ngModel)]="horarioInicio" (change)="atualizarFimETotal()">
      <option value="">Selecione um horário</option>
      <option *ngFor="let slot of horariosDisponiveis" [value]="slot.inicio" [disabled]="quantidadeAulas===2 && !slot.podeDuasAulas || quantidadeAulas===1 && !slot.podeUmaAula">
        {{ slot.inicio }} ({{ quantidadeAulas }} aula{{ quantidadeAulas>1?'s':'' }})
      </option>
    </select>

    <label>Quantidade de aulas:</label>
    <select [(ngModel)]="quantidadeAulas" (change)="atualizarFimETotal()">
      <option [value]="1">1</option>
      <option [value]="2">2</option>
    </select>
  </div>

  <div class="informacoes">
    <div class="instrutor">
      <img [src]="instrutor?.fotoPerfilUrl" alt="Foto do instrutor" />
      <h3>{{ instrutor?.nome }}</h3>
      <p>{{ instrutor?.bio }}</p>
      <p>Veículo: {{ instrutor?.veiculo?.marca }} {{ instrutor?.veiculo?.modelo }} {{ instrutor?.veiculo?.ano }}</p>
      <p>Endereço: {{ instrutor?.enderecoFavorito }}</p>
    </div>

    <label>Local de Encontro</label>
    <input type="text" [(ngModel)]="localEncontro" />

    <label>Horário Final</label>
    <input type="text" [value]="horarioFim" readonly />

    <label>Total</label>
    <input type="text" [value]="'R$ '+total.toFixed(2)" readonly />

    <button class="btn-cancelar" (click)="router.navigate(['/'])">Cancelar</button>
    <button class="btn-agendar" (click)="agendarAula()">Agendar aula</button>
  </div>
</div>
