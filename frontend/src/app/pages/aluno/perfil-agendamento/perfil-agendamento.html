<div class="agendamento-container">
  <div class="agendamento-left">
    <h2>Agendar Aula</h2>

  <div class="calendar-wrapper" *ngIf="instrutor">
    <app-calendar 
      [instrutorId]="instrutor.usuario.id"
      [selectedDate]="dataSelecionada"
      (dateChange)="onDataChange()">
    </app-calendar>
  </div>

    <label>Horário Inicial</label>
    <select [(ngModel)]="horarioInicio" name="horarioInicio" (change)="atualizarFimETotal()">
      <option value="">Selecione um horário</option>
      <option *ngFor="let slot of horariosDisponiveis; let i = index; trackBy: trackByIndex" [value]="slot.inicio">
        {{ slot.inicio }} ({{ quantidadeAulas }} aula{{ quantidadeAulas > 1 ? 's' : '' }})
      </option>
    </select>

    <label>Quantidade de aulas</label>
    <select [(ngModel)]="quantidadeAulas" name="quantidadeAulas" (change)="atualizarFimETotal()">
      <option [value]="1">1</option>
      <option [value]="2">2</option>
    </select>

    <div *ngIf="mensagemErro" class="mensagem-erro">{{ mensagemErro }}</div>
  </div>

  <div class="agendamento-right" *ngIf="instrutor">
    <h3>Informações do Instrutor</h3>

    <div class="card-info">
      <div class="info-item"><label>Duração da aula</label><input [value]="instrutor.duracaoAula + ' min'" readonly></div>
      <div class="info-item"><label>Tolerância a atrasos</label><input [value]="instrutor.toleranciaEspera + ' min'" readonly></div>
      <div class="info-item"><label>Local de encontro</label><input [value]="localEncontro" readonly></div>
      <div class="info-item"><label>Veículo</label><input [value]="instrutor.veiculos.find(v=>v.principal)?.marca + ' ' + instrutor.veiculos.find(v=>v.principal)?.modelo + ' ' + instrutor.veiculos.find(v=>v.principal)?.ano" readonly></div>
      <div class="info-item"><label>Horário Final</label><input [value]="horarioFim" readonly></div>
      <div class="info-item"><label>Valor da hora</label><input [value]="'R$ ' + instrutor.valorAula.toFixed(2)" readonly></div>
      <div class="info-item"><label>Total</label><input [value]="'R$ ' + total.toFixed(2)" readonly></div>
    </div>

    <div class="botoes">
      <button class="btn-cancelar" (click)="router.navigate(['/'])">Cancelar</button>
      <button class="btn-agendar" (click)="agendarAula()">Agendar aula</button>
    </div>
  </div>
</div>
