<app-header-aluno></app-header-aluno>

<div class="page" *ngIf="instrutor; else carregando">

  <section class="main-card">

    <!-- Galeria de fotos do veículo -->
    <div class="gallery">
      <ng-container *ngFor="let foto of instrutor.fotosVeiculo">
        <img [src]="foto" alt="Foto do veículo">
      </ng-container>
    </div>

    <!-- Perfil do instrutor -->
    <div class="profile">
      <div class="avatar">
        <img *ngIf="instrutor.fotoPerfilUrl" [src]="instrutor.fotoPerfilUrl" alt="Foto do instrutor">
        <span *ngIf="!instrutor.fotoPerfilUrl">♡</span>
      </div>
      <div class="profile-info">
        <h3>{{ instrutor.nome }} <span *ngIf="instrutor.verificado">✦ Verificado</span></h3>
        <p>{{ instrutor.bio }}</p>
      </div>
    </div>

    <!-- Informações do veículo -->
    <h3>Veículo</h3>
    <div class="vehicle-grid">
      <div><label>Categoria</label><input [value]="instrutor.categoriaVeiculo" readonly></div>
      <div><label>Câmbio</label><input [value]="instrutor.cambio" readonly></div>
      <div><label>Cor</label><input [value]="instrutor.cor" readonly></div>
      <div><label>Ano</label><input [value]="instrutor.ano" readonly></div>
    </div>

    <!-- Recursos extras -->
    <h3>Recursos extras</h3>
    <div class="extras-grid">
      <button *ngFor="let r of instrutor.recursos" class="active">{{ r }} ✓</button>
    </div>

  </section>

  <!-- Agendamento -->
  <aside class="schedule-card">
    <h3>Localização</h3>
<iframe 
  *ngIf="mapaUrlSeguro" 
  [src]="mapaUrlSeguro" 
  width="100%" 
  height="450" 
  frameborder="0" 
  style="border:0" 
  allowfullscreen>
</iframe>

<p *ngIf="!mapaUrlSeguro">Mapa não disponível para este local.</p>

    <h3>Agenda</h3>
    <div class="calendar">
      <app-calendar></app-calendar>
    </div>

    <p><strong>Horário:</strong> 08:00 até 12:00</p>
    <div class="hours"><input value="08:00" readonly><span>até</span><input value="12:00" readonly></div>

    <button class="schedule-btn" (click)="agendarAula()">Agendar aula</button>
  </aside>
</div>

<ng-template #carregando>
  <div class="loading"><p>{{ mensagemCarregamento }}</p></div>
</ng-template>
