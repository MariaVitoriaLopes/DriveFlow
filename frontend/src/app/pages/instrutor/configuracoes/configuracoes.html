<app-header-instrutor></app-header-instrutor>

<section class="config-page">
  <aside class="sidebar">
    <div class="profile">
      <div class="avatar"></div>

      <h2>{{ usuario?.usuario?.nome || usuario?.nome || 'Instrutor' }}</h2>
      <p>Perfil ativo</p>

      <span class="status">
        <span></span>
        Disponível
      </span>
    </div>

    <nav class="menu">
      <button type="button" [class.active]="abaAtiva === 'pessoais'" (click)="trocarAba('pessoais')">
        Informações pessoais
      </button>

      <button type="button" [class.active]="abaAtiva === 'endereco'" (click)="trocarAba('endereco')">
        Endereço
      </button>

      <button type="button" [class.active]="abaAtiva === 'veiculo'" (click)="trocarAba('veiculo')">
        Veículo
      </button>

      <button type="button" [class.active]="abaAtiva === 'documentos'" (click)="trocarAba('documentos')">
        Documentos
      </button>

      <button type="button" [class.active]="abaAtiva === 'configuracoes'" (click)="trocarAba('configuracoes')">
        Configurações
      </button>
    </nav>

    <button
      type="button"
      class="delete-btn"
      (click)="apagarMinhaConta()"
    >
      Apagar minha conta
    </button>
  </aside>

  <div class="aba-conteudo">

    <div *ngIf="abaAtiva === 'pessoais'">
      <app-form-informacoes-pessoais></app-form-informacoes-pessoais>
    </div>

    <div *ngIf="abaAtiva === 'endereco'">
      <div class="header">
        <h2>Locais de atendimento</h2>

        <button
          type="button"
          class="btn-add"
        >
          Adicionar novo endereço
        </button>
      </div>

      <app-form-locais-atendimento #formLocais></app-form-locais-atendimento>
    </div>

    <div *ngIf="abaAtiva === 'veiculo'">
      <section class="veiculos-section">
        <h1>Veículo</h1>

        <button
          *ngIf="!mostrandoFormNovoVeiculo"
          type="button"
          (click)="abrirFormNovoVeiculo()"
        >
          Adicionar novo veículo
        </button>

        <div *ngIf="!mostrandoFormNovoVeiculo">
          <p *ngIf="veiculos.length === 0">
            Nenhum veículo cadastrado ainda.
          </p>

          <app-form-veiculos
            *ngFor="let veiculo of veiculos; trackBy: trackByVeiculoId"
            [veiculo]="veiculo"
            (veiculoAtualizado)="atualizarVeiculo($event)"
            (veiculoDeletado)="deletarVeiculo($event)"
          ></app-form-veiculos>
        </div>

        <div *ngIf="mostrandoFormNovoVeiculo">
          <app-form-add-novo-veiculo
            (veiculoSalvo)="salvarNovoVeiculo($event)"
            (cancelar)="cancelarNovoVeiculo()"
          ></app-form-add-novo-veiculo>
        </div>
      </section>
    </div>

    <div *ngIf="abaAtiva === 'documentos'">
      <div class="header">
        <h1>Documentos</h1>

        <button type="button" (click)="abrirModal()">
          Adicionar novo documento
        </button>
      </div>

      <div class="modal-backdrop" *ngIf="modalAberto">
        <div class="modal">
          <button type="button" (click)="selecionarDocumento('CNH')">
            CNH
          </button>

          <button type="button" (click)="selecionarDocumento('CERTIFICADO')">
            Certificado
          </button>

          <button type="button" class="close-btn" (click)="fecharModal()">
            Cancelar
          </button>
        </div>
      </div>

      <app-form-documentos
        [instrutor]="usuario"
        [abaAtiva]="abaAtiva"
      ></app-form-documentos>
    </div>

    <div *ngIf="abaAtiva === 'configuracoes'">
      <h1>Configurações</h1>
      <app-config-sistema></app-config-sistema>
    </div>

  </div>
</section>
