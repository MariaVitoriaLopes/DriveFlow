<app-header-instrutor></app-header-instrutor>

<section class="config-page">

  <aside class="sidebar">
    <div class="profile">
      <div class="avatar"></div>
      <h2>{{ usuario?.usuario?.nome || usuario?.nome }}</h2>
      <p>Perfil ativo</p>
      <span class="status"><span></span>Disponível</span>
    </div>

    <nav class="menu">
      <button type="button" [class.active]="abaAtiva === 'pessoais'" (click)="trocarAba('pessoais')">Informações pessoais</button>
      <button type="button" [class.active]="abaAtiva === 'endereco'" (click)="trocarAba('endereco')">Endereço</button>
      <button type="button" [class.active]="abaAtiva === 'veiculo'" (click)="trocarAba('veiculo')">Veículo</button>
      <button type="button" [class.active]="abaAtiva === 'documentos'" (click)="trocarAba('documentos')">Documentos</button>
      <button type="button" [class.active]="abaAtiva === 'configuracoes'" (click)="trocarAba('configuracoes')">Configurações</button>
    </nav>

    <button type="button" class="delete-btn">Apagar minha conta</button>
  </aside>

  <div class="aba-conteudo">
    <!-- INFORMAÇÕES PESSOAIS -->
    <div *ngIf="abaAtiva === 'pessoais'">
      <app-form-informacoes-pessoais></app-form-informacoes-pessoais>
    </div>

    <!-- ENDEREÇO -->
    <div *ngIf="abaAtiva === 'endereco'">
      <h1>Endereços</h1>
      <button type="button" routerLink="/instrutor/add-novo-endereco">Adicionar novo endereço</button>
      <app-form-locais-atendimento></app-form-locais-atendimento>
    </div>

    <!-- VEÍCULO -->
    <div *ngIf="abaAtiva === 'veiculo'">
      <form [formGroup]="formVeiculo" (ngSubmit)="salvarVeiculo()">
        <h1>Veículo</h1>
      </form>
    </div>

    <!-- DOCUMENTOS -->
    <div *ngIf="abaAtiva === 'documentos'">
      <form [formGroup]="formDocumentos" (ngSubmit)="salvarDocumentos()">
        <h1>Documentos</h1>
      </form>
    </div>

    <!-- CONFIGURAÇÕES -->
    <div *ngIf="abaAtiva === 'configuracoes'">
      <form [formGroup]="formConfiguracoes" (ngSubmit)="salvarConfiguracoes()">
        <h1>Configurações</h1>
      </form>
    </div>
  </div>
</section>
