<div class="veiculo-card" *ngIf="veiculo">
  <div class="header">
    <h3>
      {{ veiculo.marca || 'Marca' }}
      {{ veiculo.modelo || 'Modelo' }}
      {{ veiculo.cor || '' }}
      {{ veiculo.ano || '' }}
    </h3>
  </div>

  <div class="imagens">
    <p>Fotos do veículo — máximo 4 imagens.</p>

    <div class="fotos-grid">
      <div
        class="foto-box"
        *ngFor="let img of fotosPreview; let i = index"
        (click)="editMode ? abrirSeletorFoto(i) : null">

        <input
          type="file"
          accept="image/png, image/jpeg, image/jpg"
          hidden
          #fotoInput
          (change)="onFotoSelecionada($event, i)">

        <img *ngIf="img" [src]="img" alt="Foto {{ i + 1 }}">

        <span *ngIf="!img">
          {{ editMode ? '+' : 'Sem foto' }}
        </span>

        <button
          *ngIf="editMode && img"
          type="button"
          class="btn-remover-foto"
          (click)="removerFoto(i); $event.stopPropagation()">
          Remover
        </button>
      </div>
    </div>
  </div>

  <form [formGroup]="veiculoForm" class="form-veiculo">
    <div class="row">
      <div>
        <label>Marca</label>
        <input formControlName="marca" />
      </div>
    </div>

    <div class="row">
      <div>
        <label>Modelo</label>
        <input formControlName="modelo" />
      </div>
    </div>

    <div class="row">
      <div>
        <label>Cor</label>
        <input formControlName="cor" />
      </div>

      <div>
        <label>Ano</label>
        <input formControlName="ano" type="number" />
      </div>
    </div>

    <div class="row">
      <div>
        <label>Placa</label>
        <input formControlName="placa" />
      </div>

      <div>
        <label>Câmbio</label>
        <input formControlName="cambio" />
      </div>

      <div>
        <label>Categoria</label>
        <input formControlName="categoria" />
      </div>
    </div>

    <div class="checkbox">
      <label>
        <input type="checkbox" formControlName="principal" />
        Definir como carro para as aulas
      </label>
    </div>

    <div class="acoes">
      <button type="button" class="deletar" (click)="onDeletar()">
        Deletar veículo
      </button>

      <button type="button" class="editar-btn" (click)="toggleEdit()">
        {{ editMode ? 'Cancelar' : 'Editar veículo' }}
      </button>
    </div>

    <button type="button" (click)="toggleEdit()" *ngIf="editMode">
      Descartar alterações
    </button>

    <button type="button" class="salvar" (click)="onSalvar()" [disabled]="!editMode">
      Salvar alterações
    </button>
  </form>
</div>
