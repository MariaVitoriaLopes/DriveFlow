<p>Quantidade: {{ veiculos.length }}</p>

<div
  *ngFor="let veiculo of veiculos; let i = index"
  class="veiculo-card"
>

  <div class="header">
    <h3>
      {{ veiculo.marca }}
      {{ veiculo.modelo }}
      {{ veiculo.cor }}
      {{ veiculo.ano }}
    </h3>
  </div>

  <div class="imagens">

    <div class="foto-principal">

      <img
        *ngIf="veiculo.fotoUrls?.length"
        [src]="veiculo.fotoUrls?.[0]"
        alt="Foto veículo"
      />

      <div
        *ngIf="!veiculo.fotoUrls?.length"
        class="sem-foto"
      >
        Sem foto
      </div>

    </div>

    <div class="outras-fotos">

      <div
        class="foto-add"
        *ngFor="let img of (veiculo.fotoUrls || []).slice(1, 4)"
      >

        <img
          *ngIf="img"
          [src]="img"
          alt="Foto adicional"
        />

        <span *ngIf="!img">
          Sem foto
        </span>

      </div>

    </div>

  </div>

  <div class="form-veiculo">

    <div class="row">

      <div>
        <label>Marca</label>
        <input [value]="veiculo.marca || ''" disabled />
      </div>

      <div>
        <label>Versão</label>
        <input [value]="veiculo.versao || ''" disabled />
      </div>

    </div>

    <div class="row">

      <div>
        <label>Modelo</label>
        <input [value]="veiculo.modelo || ''" disabled />
      </div>

    </div>

    <div class="row">

      <div>
        <label>Cor</label>
        <input [value]="veiculo.cor || ''" disabled />
      </div>

      <div>
        <label>Ano</label>
        <input [value]="veiculo.ano || ''" disabled />
      </div>

    </div>

    <div class="row">

      <div>
        <label>Placa</label>
        <input [value]="veiculo.placa || ''" disabled />
      </div>

      <div>
        <label>Câmbio</label>
        <input [value]="veiculo.cambio || ''" disabled />
      </div>

      <div>
        <label>Categoria</label>
        <input [value]="veiculo.categoria || ''" disabled />
      </div>

    </div>

    <div class="checkbox">

      <label>

        <input
          type="checkbox"
          [checked]="veiculo.padrao"
          disabled
        />

        Definir como carro para as aulas

      </label>

    </div>

    <div class="acoes">

      <button
        type="button"
        class="deletar"
      >
        Deletar veículo
      </button>

      <button
        type="button"
        class="editar-btn"
        (click)="editarVeiculo(veiculo, i)"
      >
        Editar veículo
      </button>

    </div>

  </div>

</div>

<div
  *ngIf="!veiculos.length"
  class="sem-veiculos"
>
  Nenhum veículo cadastrado.
</div>
