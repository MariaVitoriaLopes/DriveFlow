<form [formGroup]="veiculoForm" class="veiculo-form">

  <h2>Veículo 1</h2>

  <div class="upload-section">
    <div class="main-upload" (click)="uploadMainImage()">
      <input type="file" accept="image/png, image/jpeg, image/jpg" hidden #mainFile (change)="onMainImageSelected($event)">
      <img *ngIf="mainImageUrl" [src]="mainImageUrl" alt="Veículo">
      <span *ngIf="!mainImageUrl">
        Escolha até 4 imagens de boa qualidade.<br>
        Formatos permitidos: PNG, JPEG e JPG.
      </span>
    </div>

    <div class="side-uploads">
      <div class="side-upload" *ngFor="let img of sideImages; let i = index" (click)="uploadSideImage(i)">
        <input type="file" accept="image/png, image/jpeg, image/jpg" hidden #sideFile (change)="onSideImageSelected($event, i)">
        <img *ngIf="img" [src]="img" alt="Imagem {{i+1}}">
        <span *ngIf="!img">+</span>
      </div>
    </div>
  </div>

  <div class="form-row">
    <label>Marca</label>
    <select formControlName="marca">
      <option value="">Marca</option>
      <option *ngFor="let m of marcas" [value]="m">{{m}}</option>
    </select>

    <label>Versão <span class="optional">(Opcional)</span></label>
    <select formControlName="versao">
      <option value="">Selecione versão</option>
      <option *ngFor="let v of versoes" [value]="v">{{v}}</option>
    </select>
  </div>

  <div class="form-row">
    <label>Modelo</label>
    <input type="text" placeholder="Escolha o modelo" formControlName="modelo">

    <label>Cor</label>
    <div class="radio-group">
      <label *ngFor="let c of cores">
        <input type="radio" [value]="c" formControlName="cor">{{c}}
      </label>
    </div>

    <label>Ano</label>
    <select formControlName="ano">
      <option *ngFor="let a of anos" [value]="a">{{a}}</option>
    </select>
  </div>

  <div class="form-row">
    <label>Placa</label>
    <input type="text" formControlName="placa">

    <label>Câmbio</label>
    <select formControlName="cambio">
      <option *ngFor="let c of cambios" [value]="c">{{c}}</option>
    </select>

    <label>Categoria</label>
    <select formControlName="categoria">
      <option *ngFor="let cat of categorias" [value]="cat">{{cat}}</option>
    </select>
  </div>

  <div class="recursos-section">
    <h3>Recursos extras</h3>
    <div class="recursos-grid">
      <button type="button" *ngFor="let r of recursos" (click)="toggleRecurso(r)" [class.active]="veiculoForm.value.recursos.includes(r)">
        {{r}}
      </button>
    </div>
  </div>

  <div class="form-row">
    <label>Informações extras</label>
    <textarea formControlName="infoExtra" placeholder="Bom para iniciantes, utilizado em provas, etc..." maxlength="500"></textarea>
    <span>{{veiculoForm.value.infoExtra.length}}/500</span>
  </div>

  <div class="info-box">
    Este veículo deve estar em situação regular e com a documentação atualizada!
  </div>

  <div class="form-row checkbox-row">
    <label>
      <input type="checkbox" formControlName="padrao"> Definir como carro para as aulas
    </label>
  </div>

  <button type="submit" (click)="submit()" [disabled]="veiculoForm.invalid">Salvar veículo</button>

</form>
